name: Publish Articles to Contentful

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum number of articles to publish'
        required: false
        default: '5'
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore service account JSON from secret
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
          fi
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Publish to Contentful
        env:
          # Contentful (create_blog_entry.py expects CONTENTFUL_CMA_TOKEN)
          CONTENTFUL_CMA_TOKEN: ${{ secrets.CONTENTFUL_CMA_TOKEN }}
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ENVIRONMENT: ${{ secrets.CONTENTFUL_ENVIRONMENT || 'master' }}
          # Image generation
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          # REST API backend (preferred)
          USE_BLOG_API: ${{ vars.USE_BLOG_API || 'true' }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE || 'https://speakabout.ai/api/blog-pipeline' }}
          BLOG_PIPELINE_API_KEY: ${{ secrets.BLOG_PIPELINE_API_KEY }}
          # Legacy Google Sheets backend (fallback)
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_WORKSHEET: '2026'
          GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
        run: python from_sheet.py --limit ${{ github.event.inputs.limit || '5' }}
