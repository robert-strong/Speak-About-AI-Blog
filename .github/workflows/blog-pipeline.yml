name: Monthly Blog Pipeline

on:
  schedule:
    # Cron fires every Monday at 03:17 UTC. The "gate" job below filters this
    # down to ONLY the LAST Monday of each calendar month. Off-peak minute (:17)
    # and odd hour (03 UTC) avoid GitHub Actions queue congestion that delays
    # top-of-the-hour jobs.
    - cron: '17 3 * * 1'
  workflow_dispatch:  # always runs immediately, ignores the gate

jobs:
  # First job: decide whether this run should proceed. Manual triggers always
  # proceed; scheduled triggers only proceed on the last Monday of the month.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check if this run should proceed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — proceeding regardless of date."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Today is a Monday (the cron only fires on Mondays). To check if
          # it's the LAST Monday of the month, see whether 7 days from now
          # falls in a different calendar month. If yes, today is the last
          # Monday; if no, there's another Monday this month.
          this_month=$(date -u +%m)
          next_week_month=$(date -u -d '+7 days' +%m)
          if [ "$this_month" != "$next_week_month" ]; then
            echo "Last Monday of $(date -u +%B %Y) — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not the last Monday of the month (next Monday is still in this month) — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore service account JSON from secret
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON repo secret is missing or empty. Add it at Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
          python -c "import json; json.load(open('service_account.json'))" || {
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON is set but not valid JSON. Paste the entire service_account.json file as the secret value (including the outer braces)."
            exit 1
          }
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Run blog pipeline
        env:
          CONTENTFUL_CMA_TOKEN: ${{ secrets.CONTENTFUL_CMA_TOKEN }}
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ENVIRONMENT: master
          CONTENTFUL_CONTENT_TYPE: blogPost
          CONTENTFUL_LOCALE: en-US
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_WORKSHEET: '2026'
          GOOGLE_SERVICE_ACCOUNT_FILE: service_account.json
          PUBLISH_TZ: America/Chicago
          PUBLISH_DOW: '0'
          PUBLISH_HOUR: '9'
        run: python run_pipeline.py
